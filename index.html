<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Counter - Сравнение игроков</title>
    <style>
        :root { --cs-orange: #f89406; --cs-dark: #222; }
        body { font-family: 'Arial', sans-serif; background: #1b1e21; color: white; margin: 0; text-align: center; }
        header { background: var(--cs-dark); padding: 20px; border-bottom: 3px solid var(--cs-orange); }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; }
        
        .selector-area { display: flex; justify-content: space-around; margin-bottom: 30px; gap: 20px; }
        select { padding: 10px; background: #333; color: white; border: 1px solid var(--cs-orange); border-radius: 5px; width: 45%; }

        .comparison-table { width: 100%; border-collapse: collapse; background: #2a2d32; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #3e4248; text-align: center; }
        th { background: #333; color: var(--cs-orange); }
        
        .winner { color: #00ff00; font-weight: bold; }
        .stat-name { font-weight: bold; color: #aaa; }
        .player-header { font-size: 1.5rem; color: var(--cs-orange); }
    </style>
</head>
<body>

<header>
    <h1>CS Stats Comparer</h1>
    <p>Данные на основе статистики HLTV</p>
</header>

<div class="container">
    <div class="selector-area">
        <select id="player1" onchange="compare()">
            <option value="zywoo">ZywOo</option>
            <option value="m0nesy">m0NESY</option>
            <option value="donk">donk</option>
        </select>
        <select id="player2" onchange="compare()">
            <option value="zywoo">ZywOo</option>
            <option value="m0nesy" selected>m0NESY</option>
            <option value="donk">donk</option>
        </select>
    </div>

    <table class="comparison-table">
        <thead>
            <tr>
                <th id="p1-name" class="player-header">Игрок 1</th>
                <th>Характеристика</th>
                <th id="p2-name" class="player-header">Игрок 2</th>
            </tr>
        </thead>
        <tbody id="stats-body">
            </tbody>
    </table>
</div>

<script>
    // База данных (сюда ты можешь вписывать новых игроков)
    const players = {
        zywoo: { name: "ZywOo", rating: 1.30, dpr: 0.59, impact: 1.35, adr: 82.5 },
        m0nesy: { name: "m0NESY", rating: 1.28, dpr: 0.61, impact: 1.29, adr: 78.4 },
        donk: { name: "donk", rating: 1.45, dpr: 0.65, impact: 1.70, adr: 95.2 }
    };

    function compare() {
        const p1Key = document.getElementById('player1').value;
        const p2Key = document.getElementById('player2').value;
        
        const p1 = players[p1Key];
        const p2 = players[p2Key];

        document.getElementById('p1-name').innerText = p1.name;
        document.getElementById('p2-name').innerText = p2.name;

        const stats = [
            { label: "Rating 2.0", key: "rating" },
            { label: "DPR (Смертей за раунд)", key: "dpr", lowerBetter: true },
            { label: "Impact", key: "impact" },
            { label: "ADR", key: "adr" }
        ];

        let html = "";
        stats.forEach(stat => {
            const val1 = p1[stat.key];
            const val2 = p2[stat.key];
            
            let class1 = "", class2 = "";
            if (stat.lowerBetter) {
                if (val1 < val2) class1 = "winner"; else if (val2 < val1) class2 = "winner";
            } else {
                if (val1 > val2) class1 = "winner"; else if (val2 > val1) class2 = "winner";
            }

            html += `<tr>
                <td class="${class1}">${val1}</td>
                <td class="stat-name">${stat.label}</td>
                <td class="${class2}">${val2}</td>
            </tr>`;
        });

        document.getElementById('stats-body').innerHTML = html;
    }

    // Запуск при загрузке
    compare();
</script>

</body>
</html>
