<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Global Analytics</title>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #161a1e; --text: #eaecef; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: #161a1e; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .tabs { display: flex; justify-content: center; background: #161a1e; sticky: top; }
        .tab { padding: 15px 25px; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { border-color: var(--gold); color: var(--gold); }
        .content { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: none; }
        .content.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2b3139; }
        th { background: #2b3139; color: var(--gold); }
        .pts-input { width: 60px; background: #0b0e11; color: white; border: 1px solid var(--gold); border-radius: 4px; padding: 5px; }
        .t-card { background: var(--card); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #555; }
        .high { border-left-color: #f84960; }
    </style>
</head>
<body>

<header>
    <h1>CS2 ANALYTICS HUB</h1>
    <div id="last-update" style="font-size: 0.8rem; color: #848e9c;">Загрузка данных...</div>
</header>

<div class="tabs">
    <div class="tab active" onclick="openTab(event, 'vrs')">VRS Прогноз</div>
    <div class="tab" onclick="openTab(event, 'events')">Турниры</div>
    <div class="tab" onclick="openTab(event, 'stats')">Составы</div>
</div>

<div id="vrs" class="content active">
    <table>
        <thead><tr><th>#</th><th>Команда</th><th>VRS Очки</th><th>Прогноз (+/-)</th><th>Итого</th></tr></thead>
        <tbody id="vrs-body"></tbody>
    </table>
</div>

<div id="events" class="content">
    <div id="event-list"></div>
</div>

<div id="stats" class="content">
    <div style="text-align:center; padding:50px; background:var(--card); border-radius:10px;">
        <h3>Сравнение огневой мощи составов</h3>
        <p>Модуль анализа данных HLTV в разработке.</p>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let content = document.getElementsByClassName("content");
        for (let i = 0; i < content.length; i++) content[i].classList.remove("active");
        let tabs = document.getElementsByClassName("tab");
        for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    async function loadData() {
        try {
            // Добавляем timestamp, чтобы браузер не кешировал старые данные
            const response = await fetch('data.json?t=' + Date.now());
            const data = await response.json();
            
            document.getElementById('last-update').innerText = "Обновлено: " + data.last_updated;

            // Рендерим таблицу
            const tbody = document.getElementById('vrs-body');
            tbody.innerHTML = data.teams.map((team, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><b>${team.name}</b></td>
                    <td>${team.points}</td>
                    <td><input type="number" class="pts-input" value="0" onchange="updateRow(this, ${team.points})"></td>
                    <td class="total-pts">${team.points}</td>
                </tr>
            `).join('');

            // Рендерим турниры
            const evList = document.getElementById('event-list');
            evList.innerHTML = data.events.map(ev => `
                <div class="t-card ${ev.priority}">
                    <h3>${ev.name}</h3>
                    <p>Дата: ${ev.date} | Важность: <b>${ev.status}</b></p>
                </div>
            `).join('');

        } catch (e) { console.error("Ошибка загрузки данных", e); }
    }

    function updateRow(input, base) {
        const row = input.closest('tr');
        row.querySelector('.total-pts').innerText = base + (parseInt(input.value) || 0);
    }

    loadData();
</script>
</body>
</html>
