<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VRS Predictor - CS2</title>
    <style>
        body { font-family: sans-serif; background: #0b0e11; color: white; padding: 20px; }
        .card { background: #161a1e; border: 1px solid #2b2f36; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        select, input { width: 100%; padding: 10px; margin: 10px 0; background: #2b2f36; border: none; color: white; border-radius: 5px; }
        .result-box { margin-top: 20px; padding: 15px; background: #1e2329; border-left: 4px solid #f0b90b; }
        .btn-calc { background: #f0b90b; color: black; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .target { color: #848e9c; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Прогноз рейтинга Valve (VRS)</h2>
    <p>Выбери команду и ее будущие результаты:</p>

    <label>Команда:</label>
    <select id="teamSelect">
        <option value="1200">Spirit (1200 pts)</option>
        <option value="1150">FaZe (1150 pts)</option>
        <option value="980">Vitality (980 pts)</option>
        <option value="850">Virtus.pro (850 pts)</option>
    </select>

    <label>Результат на ближайшем Tier-1 (например, IEM):</label>
    <select id="tournamentResult">
        <option value="0">Не участвует (0 pts)</option>
        <option value="400">Победа (1 место) — +400 pts</option>
        <option value="250">Финал (2 место) — +250 pts</option>
        <option value="150">Полуфинал (3-4 место) — +150 pts</option>
        <option value="50">Групповой этап — +50 pts</option>
    </select>

    <button class="btn-calc" onclick="calculate()">Рассчитать шансы</button>

    <div id="result" class="result-box" style="display:none;">
        <div id="totalPoints"></div>
        <div id="verdict"></div>
        <div class="target">Примерный порог инвайта на Мейджор: ~1050 pts</div>
    </div>
</div>

<script>
    function calculate() {
        const basePoints = parseInt(document.getElementById('teamSelect').value);
        const addedPoints = parseInt(document.getElementById('tournamentResult').value);
        const total = basePoints + addedPoints;
        const threshold = 1050; // Условный порог топ-16 мира

        document.getElementById('result').style.display = 'block';
        document.getElementById('totalPoints').innerHTML = `<h3>Итого: ${total} очков</h3>`;

        if (total >= threshold) {
            document.getElementById('verdict').innerHTML = "<span style='color:#02c076'>✅ Высокий шанс:</span> Команда проходит в топ-16 по рейтингу.";
        } else {
            const diff = threshold - total;
            document.getElementById('verdict').innerHTML = `<span style='color:#f84960'>❌ Недостаточно:</span> Нужно еще минимум ${diff} очков для инвайта.`;
        }
    }
</script>

</body>
</html>
